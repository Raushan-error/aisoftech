<section class="section">
  <div class="container container-md">
    <div class="section-header text-center animate-slide-up">
      <h1 class="title">Featured Projects</h1>
      <p class="subtitle">Showcasing some of our most impactful enterprise deliveries.</p>
    </div>
    
    <div class="projects-grid">
      <div class="card card-animated animate-slide-up" [style.animationDelay]="i * 200 + 'ms'" *ngFor="let project of projects; let i = index">
        <div class="card-inner" style="padding:0;">
          <div class="project-img-placeholder">
            <span class="icon animate-float">{{ project.image }}</span>
          </div>
          <div class="project-content">
            <h3>{{ project.title }}</h3>
            <p>{{ project.desc }}</p>
            <div class="tags">
              <span class="tag animate-scale-in" [style.animationDelay]="(i * 200 + j * 100) + 'ms'" *ngFor="let tag of project.tags; let j = index">{{ tag }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
